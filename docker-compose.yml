services:
  db:
    image: postgres:16-alpine
    container_name: adpilot-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: adpilot
      POSTGRES_PASSWORD: adpilot_dev
      POSTGRES_DB: adpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - adpilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adpilot -d adpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - adpilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adpilot-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://adpilot:adpilot_dev@db:5432/adpilot
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    networks:
      - adpilot-network

networks:
  adpilot-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
