services:
  db:
    image: postgres:16-alpine
    container_name: adpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: adpilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable is required}
      POSTGRES_DB: adpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - adpilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adpilot -d adpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adpilot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-adpilot_redis_dev}
    volumes:
      - redisdata:/data
    networks:
      - adpilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-adpilot_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adpilot-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://adpilot:${DB_PASSWORD:?DB_PASSWORD environment variable is required}@db:5432/adpilot
      REDIS_URL: redis://:${REDIS_PASSWORD:-adpilot_redis_dev}@redis:6379
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - adpilot-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: adpilot-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://adpilot:${DB_PASSWORD:?DB_PASSWORD environment variable is required}@db:5432/adpilot
      REDIS_URL: redis://:${REDIS_PASSWORD:-adpilot_redis_dev}@redis:6379
    networks:
      - adpilot-network

  nginx:
    image: nginx:alpine
    container_name: adpilot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      app:
        condition: service_healthy
    networks:
      - adpilot-network

networks:
  adpilot-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-var:
  certbot-www:
